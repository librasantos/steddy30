    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      /* ── Steddi Design Tokens ─────────────────────────── */

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FBFAF7;
      color: #1A1714;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overscroll-behavior: none;
      letter-spacing: -0.01em;
    }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: inherit; }
    button:focus-visible { outline: 2px solid #E07840; outline-offset: 3px; border-radius: 6px; }
    input:focus-visible, textarea:focus-visible { outline: 2px solid #E07840; outline-offset: 1px; }
    input, textarea { font-size: 16px !important; } /* prevents iOS zoom */
    h1, h2, h3, h4 { font-weight: 400; letter-spacing: -0.02em; }

    @keyframes breathe {
      0%,100% { transform: scale(1); opacity:.4; }
      50% { transform: scale(1.18); opacity:.95; }
    }
    @keyframes dolphinFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(-1.2deg); }

    @keyframes dolphinBlink {
      0%, 92%, 100% { transform: scaleY(1); }
      95%, 97% { transform: scaleY(0.1); }

      0%,100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }

      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(8deg); }

      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

      from { opacity:0; transform:translateY(16px); }

    }

      0%   { transform:scale(.88); opacity:0; }
      65%  { transform:scale(1.04); opacity:1; }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes pulse {
      0%,100% { opacity:.4; transform:scale(.88); }
      50%      { opacity:1;  transform:scale(1.12); }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity:0; }

      0%   { transform:scale(.8); opacity:0; }

    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* ── INSTANT SPLASH — shows before JS loads ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #FBF7F2;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-logo {
      font-family: Georgia, serif;
      font-size: 22px; color: #E07840;
      letter-spacing: 0.5px; margin-bottom: 28px;
    }
    #splash-dolphin { font-size: 52px; margin-bottom: 20px; animation: floatUp 2s ease-in-out infinite; }
    #splash-msg { font-size: 13px; color: #A07868; font-weight: 300; letter-spacing: 0.3px; }
    #splash-dots { display: flex; gap: 6px; margin-top: 20px; }
    #splash-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #E07840; opacity: 0.3;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Scene backgrounds ── */
    .scene-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    /* Readability scrim — softens the scene so text on top stays legible */
    .scene-layer::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(255,250,245,0.45) 0%, rgba(255,250,245,0.30) 30%, rgba(255,250,245,0.15) 60%, rgba(255,250,245,0.05) 100%);
    }
    .scene-el {
      position: absolute; user-select: none; pointer-events: none; line-height: 1;
    }

      0%   { transform: translateX(0) translateY(0) rotate(0deg); opacity:0.7; }
      50%  { transform: translateX(12px) translateY(-8px) rotate(8deg); opacity:1; }

    }

      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }

const SK = "steddi_v3";
const DK = "steddi_dump_v2";
const HK = "steddi_history_v1";
const saveHistory = (done, deferred) => {
  try {
    const raw = localStorage.getItem(HK);
    const existing = raw ? JSON.parse(raw) : [];
    const entry = { date: new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}), dateRaw: new Date().toDateString(), done: done||[], deferred: deferred||[] };
    // Don't duplicate same day
    const filtered = existing.filter(e=>e.dateRaw!==entry.dateRaw);
    const updated = [entry, ...filtered].slice(0,30); // keep 30 days
    localStorage.setItem(HK, JSON.stringify(updated));
  } catch(e) {}
};
const loadHistory = () => {
  const CUTOFF = Date.now() - (60*24*60*60*1000);
  try {
    const r=localStorage.getItem(HK); if(!r) return [];
    const all=JSON.parse(r);
    const active=all.filter(e=>{ try{return new Date(e.dateRaw||e.date).getTime()>CUTOFF;}catch(x){return true;} });
    if(active.length<all.length) try{localStorage.setItem(HK,JSON.stringify(active));}catch(x){}
    return active;
  } catch(e){return[];}
};
const TODAY = new Date().toDateString();
const sv = d => { try { localStorage.setItem(SK, JSON.stringify({...d, _date: TODAY})); } catch(e){} };
const ld = () => {
  try {
    const raw = localStorage.getItem(SK);
    if(!raw) return null;
    const d = JSON.parse(raw);
    if(d._date !== TODAY) { localStorage.removeItem(SK); return null; }
    return d;
  } catch(e){ return null; }
};
const cl = () => { try { localStorage.removeItem(SK); } catch(e){} };
const sdump = items => { try { localStorage.setItem(DK, JSON.stringify(items)); } catch(e){} };
const ldump = () => {
  try {
    const d = localStorage.getItem(DK); if(!d) return [];
    const parsed = JSON.parse(d);
    if(!Array.isArray(parsed)) return [];
    return parsed.filter(x => x && typeof x === "object" && typeof x.text === "string");
  } catch(e){ return []; }
};

// ── DEFERRED (scheduled tasks — persist independently of daily session) ──
const DEFK = "steddi_deferred_v1";
const sdef = items => { try { localStorage.setItem(DEFK, JSON.stringify(items||[])); } catch(e){} };
const ldef = () => {
  try {
    const r=localStorage.getItem(DEFK); if(!r) return [];
    const parsed = JSON.parse(r);
    if(!Array.isArray(parsed)) return [];
    // Filter out anything malformed so one bad entry can't poison the whole load
    return parsed.filter(x => x && typeof x === "object" && typeof x.text === "string");
  } catch(e){ return []; }
};

];
const MEMBERS_SETTINGS_KEY = "steddi_cal_settings";
const loadMembers = () => {
  try {
    const raw = localStorage.getItem(MEMBERS_SETTINGS_KEY);
    if(!raw) return [{name:"Me",colorIdx:0}];
    const s = JSON.parse(raw);
    if(!s || typeof s !== "object") return [{name:"Me",colorIdx:0}];
    if(!Array.isArray(s.members) || s.members.length===0) return [{name:"Me",colorIdx:0}];
    // Filter malformed members
    const clean = s.members.filter(m => m && typeof m === "object" && typeof m.name === "string");
    return clean.length > 0 ? clean : [{name:"Me",colorIdx:0}];
  } catch(e){ return [{name:"Me",colorIdx:0}]; }
};
const saveMembers = (members) => {
  try {
    const s = JSON.parse(localStorage.getItem(MEMBERS_SETTINGS_KEY)||"{}");
    s.members = members;
    localStorage.setItem(MEMBERS_SETTINGS_KEY, JSON.stringify(s));
  } catch(e){}
};
const memberColorFor = (memberName, members) => {
  if(!memberName) return MEMBER_COLORS[0];
  const m = members.find(x=>x.name.toLowerCase()===String(memberName).toLowerCase());
  return m ? MEMBER_COLORS[m.colorIdx%8] : MEMBER_COLORS[0];
};
const memberInitial = (name) => {
  if(!name) return "?";
  const parts = String(name).trim().split(/\s+/);
  return (parts[0][0]||"?").toUpperCase();
};

document.addEventListener('touchstart',_initAudio,{once:true,passive:true});

// Register Service Worker for offline + PWA install
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
let _focusLeftAt=null;
window._steddiPin=null; // set by React when PIN is active
window._steddiLock=null; // callback set by React to trigger lock
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    _focusLeftAt=Date.now();
  } else {
    const away=_focusLeftAt?Date.now()-_focusLeftAt:0;
    _focusLeftAt=null;
    // Lock app if PIN set and away >5min
    if(away>300000&&window._steddiPin&&window._steddiLock){
      window._steddiLock(true);
    } else if(away>5000){
      // Focus shield toast — no React state needed
      const _b=document.createElement('div');
      _b.style.cssText='position:fixed;top:max(60px,env(safe-area-inset-top,60px));left:16px;right:16px;background:#1A1612;color:white;border-radius:14px;padding:12px 16px;z-index:9999;display:flex;align-items:center;gap:10px;font-family:"DM Sans",sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:slideUp 0.3s ease;';
      _b.innerHTML='<div style="font-size:20px">🎯</div><div style="flex:1"><div style="font-weight:700;font-size:13px">Welcome back.</div><div style="font-size:11px;opacity:0.7;font-weight:300">Your task is still here.</div></div><button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;padding:2px;">×</button>';
      document.body.appendChild(_b);
      setTimeout(()=>{if(_b.parentElement)_b.remove();},4000);
    }
  }
});
// PWA install prompt
let _deferredInstall=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); _deferredInstall=e;
  setTimeout(()=>{
    if(_deferredInstall&&!window.matchMedia('(display-mode: standalone)').matches){
      const b=document.createElement('div');
      b.id='install-banner';
      b.style.cssText='position:fixed;bottom:80px;left:16px;right:16px;background:#E07840;color:white;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:9998;box-shadow:0 4px 20px rgba(224,120,64,0.4);font-family:"DM Sans",sans-serif;animation:slideUp 0.3s ease';
      b.innerHTML='<div style="flex:1"><div style="font-weight:700;font-size:14px">Add Steddi to Home Screen 🐬</div><div style="font-size:12px;opacity:0.85;margin-top:2px">Works offline, opens like a native app</div></div><button onclick="if(_deferredInstall){_deferredInstall.prompt();_deferredInstall=null;}document.getElementById(\'install-banner\').remove();" style="background:white;color:#E07840;border:none;border-radius:50px;padding:6px 14px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap">Install</button><button onclick="document.getElementById(\'install-banner\').remove();" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;padding:4px;">×</button>';
      document.body.appendChild(b);
    }
  }, 20000);
});

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Steddi, null));
// Fade out splash once React has rendered
requestAnimationFrame(()=>{
  requestAnimationFrame(()=>{
    const splash = document.getElementById('splash');
    if(splash){ splash.classList.add('hidden'); setTimeout(()=>splash.remove(), 450); }
  });
});
